name: Upload Benchmark Results to HuggingFace

# 任何分支 push，只要 submissions/ 下有变更就触发
on:
  push:
    paths:
      - 'submissions/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not upload to HF)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout website repo (for aggregate script and schema)
        uses: actions/checkout@v4
        with:
          repository: intellistream/vllm-hust-website
          path: vllm-hust-website

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e . jsonschema "huggingface_hub>=0.20"

      - name: Validate all submission artifacts
        run: |
          python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          from jsonschema import Draft7Validator

          schema_path = Path("vllm-hust-website/data/schemas/leaderboard_v1.schema.json")
          if not schema_path.exists():
              print("No schema found — skipping validation")
              sys.exit(0)

          schema = json.loads(schema_path.read_text())
          validator = Draft7Validator(schema)
          errors_found = False

          manifests = sorted(Path("submissions").rglob("leaderboard_manifest.json"))
          if not manifests:
              print("No submission manifests found — nothing to do")
              sys.exit(0)

          for manifest_path in manifests:
              artifact_path = manifest_path.parent / "run_leaderboard.json"
              if not artifact_path.exists():
                  print(f"WARNING: manifest present but artifact missing: {artifact_path}")
                  continue
              artifact = json.loads(artifact_path.read_text())
              errs = sorted(validator.iter_errors(artifact), key=lambda e: list(e.path))
              if errs:
                  print(f"FAIL {artifact_path}: {errs[0].message[:120]} @ {list(errs[0].path)}")
                  errors_found = True
              else:
                  print(f"OK   {artifact_path}")

          sys.exit(1 if errors_found else 0)
          PYEOF

      - name: Resolve submission directories to sync
        id: resolve-submissions
        run: |
          python - << 'PYEOF'
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          before_sha = os.environ.get("BEFORE_SHA", "")
          current_sha = os.environ.get("GITHUB_SHA", "")
          submissions_root = Path("submissions")

          submission_dirs: list[str] = []
          if event_name == "push" and before_sha and current_sha and before_sha != "0000000000000000000000000000000000000000":
              diff_output = subprocess.check_output(
                  ["git", "diff", "--name-only", before_sha, current_sha, "--", "submissions"],
                  text=True,
              )
              seen: set[str] = set()
              for raw_path in diff_output.splitlines():
                  path = Path(raw_path.strip())
                  if len(path.parts) < 2 or path.parts[0] != "submissions":
                      continue
                  candidate = submissions_root / path.parts[1]
                  manifest = candidate / "leaderboard_manifest.json"
                  if manifest.is_file():
                      resolved = str(candidate.resolve())
                      if resolved not in seen:
                          seen.add(resolved)
                          submission_dirs.append(resolved)
          else:
              submission_dirs = [str(path.parent.resolve()) for path in sorted(submissions_root.rglob("leaderboard_manifest.json"))]

          print("Submission dirs to sync:")
          for item in submission_dirs:
              print(f"- {item}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"count={len(submission_dirs)}\n")
              fh.write("dirs<<EOF\n")
              for item in submission_dirs:
                  fh.write(item + "\n")
              fh.write("EOF\n")
          PYEOF
        env:
          BEFORE_SHA: ${{ github.event.before }}

      - name: Sync submissions into HF leaderboard snapshots
        if: ${{ steps.resolve-submissions.outputs.count != '0' }}
        env:
          HF_TOKEN: ${{ secrets.DATASET_WRITE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [[ -z "${HF_TOKEN:-}" ]]; then
            echo "ERROR: DATASET_WRITE_TOKEN secret is not set."
            exit 1
          fi

          extra_args=()
          if [[ "$DRY_RUN" == "true" ]]; then
            extra_args+=(--dry-run)
          fi

          while IFS= read -r submission_dir; do
            [[ -z "$submission_dir" ]] && continue
            echo "=== syncing $submission_dir ==="
            PYTHONPATH=src python -m vllm_hust_benchmark.cli sync-submission-to-hf \
              --submission-dir "$submission_dir" \
              --aggregate-output-dir /tmp/leaderboard-data \
              --repo-id intellistream/vllm-hust-benchmark-results \
              --submissions-prefix submissions-auto \
              --commit-message "chore: sync benchmark submission and leaderboard data from ${GITHUB_REF} @ ${GITHUB_SHA::8}" \
              --execute \
              "${extra_args[@]}"
          done <<< "${{ steps.resolve-submissions.outputs.dirs }}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' && steps.resolve-submissions.outputs.count != '0' }}
        run: |
          echo "=== DRY RUN: files that would be uploaded ==="
          ls -lh /tmp/leaderboard-data/

      - name: No submissions to sync
        if: ${{ steps.resolve-submissions.outputs.count == '0' }}
        run: echo "No submission directories matched this event; nothing to upload."
